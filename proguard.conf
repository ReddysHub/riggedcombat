# ============================================
#   ProGuard Pass 1: Rename + Repackage
#   Run via Maven during 'mvn package'
# ============================================

# ---- Suppress warnings ----
-ignorewarnings
-dontwarn **

# ---- No shrinking in pass 1 ----
-dontshrink

# ---- Basic optimization in pass 1 ----
-optimizationpasses 4
-optimizations !code/merging/*,!method/inlining/*

# ---- Remove all debug info ----
-renamesourcefileattribute ''
-keepattributes *Annotation*

# ---- Aggressive Renaming ----
-repackageclasses ''
-allowaccessmodification
-flattenpackagehierarchy ''

# ---- Keep main plugin class name (referenced in plugin.yml) ----
-keep public class me.xcloud.riggedcombat.RiggedCombatPlugin extends org.bukkit.plugin.java.JavaPlugin {
    public void onEnable();
    public void onDisable();
}

# ---- Keep Bukkit interface methods ----
-keepclassmembers class * implements org.bukkit.command.CommandExecutor {
    public boolean onCommand(org.bukkit.command.CommandSender, org.bukkit.command.Command, java.lang.String, java.lang.String[]);
}

-keepclassmembers class * implements org.bukkit.command.TabCompleter {
    public java.util.List onTabComplete(org.bukkit.command.CommandSender, org.bukkit.command.Command, java.lang.String, java.lang.String[]);
}

# ---- Keep event handlers (called via reflection) ----
-keepclassmembers class * {
    @org.bukkit.event.EventHandler <methods>;
}
